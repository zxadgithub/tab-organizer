<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      html,
      body {
        width: 128px;
        height: 128px;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      .icon {
        position: relative;
        width: 128px;
        height: 128px;
        border-radius: 30px;
        background:
          radial-gradient(circle at 28% 22%, rgba(255, 255, 255, 0.9), transparent 28%),
          linear-gradient(135deg, #4169e1 0%, #28b6c8 52%, #7c65d8 100%);
        box-shadow: inset 0 0 0 3px rgba(255, 255, 255, 0.42);
      }

      .card {
        position: absolute;
        left: 22px;
        right: 22px;
        height: 18px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 8px 18px rgba(18, 32, 72, 0.22);
      }

      .card:nth-child(1) {
        top: 32px;
      }

      .card:nth-child(2) {
        top: 55px;
        left: 34px;
      }

      .card:nth-child(3) {
        top: 78px;
        right: 34px;
      }

      .dot {
        position: absolute;
        left: 33px;
        top: 37px;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #4169e1;
      }
    </style>
  </head>
  <body>
    <div class="icon">
      <div class="card"></div>
      <div class="card"></div>
      <div class="card"></div>
      <div class="dot"></div>
    </div>
  </body>
</html>
