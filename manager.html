<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tab Manager</title>
    <link rel="stylesheet" href="manager.css">
  </head>
  <body>
    <main>
      <header class="topbar">
        <div>
          <h1 data-i18n="managerTitle">Tab Manager</h1>
          <p class="sub" data-i18n="managerSub">按域名分组，拖拽即可调整标签顺序</p>
        </div>
        <div class="top-actions">
          <button id="languageToggle" class="lang-toggle" type="button" title="切换语言">EN</button>
          <button id="collapseAllButton" type="button">全部折叠</button>
          <button id="refreshButton" type="button" data-i18n="refresh">刷新</button>
          <button id="closeSelectedButton" type="button" data-i18n="closeSelected">关闭选中</button>
        </div>
      </header>

      <section class="summary-grid" id="summary"></section>

      <section class="controls">
        <label for="searchInput" data-i18n="searchLabel">筛选</label>
        <input id="searchInput" type="text" data-i18n-placeholder="searchPlaceholder" placeholder="按域名、标题、URL 搜索">
      </section>

      <section id="groups" class="groups"></section>

      <section id="undoBar" class="undo-bar hidden">
        <span id="undoText"></span>
        <button id="undoButton" type="button" data-i18n="undo">撤销</button>
      </section>
    </main>

    <template id="groupTemplate">
      <article class="group-card">
        <header class="group-header">
          <div class="group-left">
            <h2 class="group-title"></h2>
            <p class="group-meta"></p>
          </div>
          <div class="group-actions">
            <button type="button" data-action="pause-domain">暂停处理</button>
            <button type="button" data-action="pin-domain">置顶域名</button>
            <button type="button" data-action="select-group">全选</button>
            <button type="button" data-action="close-group">关闭本组</button>
          </div>
        </header>
        <ul class="tab-list"></ul>
      </article>
    </template>

    <template id="tabTemplate">
      <li class="tab-row">
        <label class="check-wrap">
          <input type="checkbox" data-role="select-tab">
        </label>
        <img class="tab-favicon" alt="">
        <div class="tab-main">
          <p class="tab-title"></p>
          <p class="tab-url"></p>
          <p class="tab-meta"></p>
        </div>
        <div class="tab-actions">
          <button type="button" data-action="pin">置顶</button>
          <button type="button" data-action="close">关闭</button>
        </div>
      </li>
    </template>

    <script src="manager.js"></script>
  </body>
</html>
